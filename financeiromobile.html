<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro Mobile - Videira</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #800020;
            --primary-dark: #5c0016;
            --accent: #D4AF37;
            --success: #1e8e3e;
            --danger: #c5221f;
            --bg: #f4f7f6;
            --text: #333;
            --radius: 15px;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            padding-bottom: 30px;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }

        /* HEADER */
        .header { 
            display: flex; align-items: center; justify-content: space-between; 
            background: white; padding: 12px 20px; border-radius: var(--radius); 
            box-shadow: var(--shadow); margin-bottom: 20px; border-bottom: 3px solid var(--primary);
        }
        .header h3 { margin: 0; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; font-weight: 800; }
        .header img { width: 35px; }

        /* MENU GRID */
        .nav-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; 
        }
        .nav-item { 
            background: white; padding: 15px; border-radius: 12px; text-align: center; 
            box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 5px; color: #666; }
        .nav-item span { font-size: 0.8rem; font-weight: 600; color: #555; }
        .nav-item.active { background: var(--primary); border-color: var(--primary); }
        .nav-item.active i, .nav-item.active span { color: white; }

        /* KPI CARDS */
        .kpi-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .kpi-card { 
            padding: 15px; border-radius: 12px; color: white; display: flex; 
            justify-content: space-between; align-items: center; box-shadow: var(--shadow);
        }
        .kpi-card.saldo { background: linear-gradient(135deg, #004a99, #003366); }
        .kpi-card.entrada { background: linear-gradient(135deg, #1e8e3e, #135c27); }
        .kpi-card.saida { background: linear-gradient(135deg, #c5221f, #8a1513); }
        .kpi-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; opacity: 0.9; }
        .kpi-value { font-size: 1.3rem; font-weight: 800; }

        /* FORMS */
        .card-panel { background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #666; margin-bottom: 5px; margin-top: 10px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
            font-family: 'Inter'; font-size: 1rem; box-sizing: border-box; background: #fafafa;
        }
        .btn-main { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 10px; font-weight: 800; font-size: 1rem; 
            margin-top: 20px; cursor: pointer; 
        }

        /* TABELAS MOBILE */
        .table-resumo { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table-resumo td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .btn-detalhes { 
            background: var(--accent); color: white; border: none; padding: 6px 12px; 
            border-radius: 6px; font-weight: 700; font-size: 0.75rem; cursor: pointer;
        }

        /* MODAL DIZIMISTA (A CARTELA) */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); display: flex; justify-content: center; 
            align-items: center; z-index: 2000; backdrop-filter: blur(3px); 
        }
        .modal-box { 
            background: white; width: 90%; max-width: 400px; padding: 25px; 
            border-radius: 20px; position: relative; box-sizing: border-box;
        }
        .cartela-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 20px; }
        .month-box { 
            background: #f0f0f0; padding: 12px 5px; border-radius: 8px; text-align: center; 
            font-size: 0.7rem; font-weight: 800; color: #999; border: 1px solid #ddd;
        }
        .month-box.paid { background: var(--success); color: white; border-color: var(--success); }
        
        .total-ano-box { 
            background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; 
            text-align: center; border-radius: 12px; margin: 15px 0;
        }

        .hidden { display: none !important; }

        /* BÍBLIA SIDEBAR */
        .biblia-panel { 
            position: fixed; top: 0; right: -100%; width: 100%; height: 100vh; 
            background: white; z-index: 3000; transition: 0.4s; display: flex; flex-direction: column;
        }
        .biblia-panel.open { right: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png">
            <h3>Financeiro Mobile</h3>
        </div>
        <button onclick="carregarTudo()" style="background:none; border:none; color:#999;"><i id="iconRefresh" class="fas fa-sync-alt"></i></button>
    </div>

    <div class="nav-grid">
        <div class="nav-item active" id="btn-financeiro" onclick="mudarSecao('financeiro')"><i class="fas fa-wallet"></i><span>Financeiro</span></div>
        <div class="nav-item" id="btn-membros" onclick="mudarSecao('membros')"><i class="fas fa-users"></i><span>Membros</span></div>
        <div class="nav-item" id="btn-dizimistas" onclick="mudarSecao('dizimistas')"><i class="fas fa-hand-holding-heart"></i><span>Dizimistas</span></div>
        <div class="nav-item" onclick="abrirBiblia()"><i class="fas fa-bible"></i><span>Bíblia</span></div>
    </div>

    <div id="secao-financeiro">
        <div class="kpi-container">
            <div class="kpi-card saldo"><div><span class="kpi-label">Saldo Acumulado</span><div class="kpi-value" id="kpiSaldo">R$ 0,00</div></div><i class="fas fa-vault fa-2x" style="opacity:0.3;"></i></div>
            <div class="kpi-card entrada"><div><span class="kpi-label">Entradas Mês</span><div class="kpi-value" id="kpiEntrada">R$ 0,00</div></div><i class="fas fa-arrow-up fa-2x" style="opacity:0.3;"></i></div>
            <div class="kpi-card saida"><div><span class="kpi-label">Saídas Mês</span><div class="kpi-value" id="kpiSaida">R$ 0,00</div></div><i class="fas fa-arrow-down fa-2x" style="opacity:0.3;"></i></div>
        </div>

        <div class="card-panel">
            <h4 style="margin:0 0 15px 0; color:var(--primary);">Novo Lançamento</h4>
            <form id="formFinanceiro">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Tipo</label><select name="tipo" id="finTipo" onchange="atualizarCategorias()"><option value="Entrada">Entrada (+)</option><option value="Saída">Saída (-)</option></select></div>
                    <div><label>Categoria</label><select name="categoria" id="finCategoria" onchange="atualizarCampos()"><option value="Dízimo">Dízimo</option><option value="Oferta">Oferta</option></select></div>
                </div>
                
                <div id="boxMembro"><label>Membro Dizimista</label><select name="membro" id="finMembroSelect"></select></div>
                <div id="boxDesc" class="hidden"><label>Descrição</label><input type="text" name="descricao" id="finDescricao" placeholder="Ex: Aluguel, Compra..."></div>

                <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:10px;">
                    <div><label>Valor (R$)</label><input type="number" step="0.01" name="valor" required placeholder="0.00"></div>
                    <div><label>Data</label><input type="date" name="data" id="finData"></div>
                </div>
                <button type="submit" id="btnSalvarFin" class="btn-main">LANÇAR VALOR</button>
            </form>
        </div>
    </div>

    <div id="secao-membros" class="hidden">
        <div class="card-panel" style="display:flex; gap:10px; align-items:center; padding:10px 15px;">
            <i class="fas fa-search" style="color:#ccc;"></i>
            <input type="text" id="buscaMembro" onkeyup="filtrarMembros()" placeholder="Buscar membro..." style="border:none; background:transparent; margin:0;">
        </div>
        <button onclick="abrirNovoMembro()" class="btn-main" style="margin-top:0; margin-bottom:15px; background:var(--success);">+ NOVO MEMBRO</button>
        <div id="listaMembros"></div>
    </div>

    <div id="secao-dizimistas" class="hidden">
        <div class="card-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h4 style="margin:0;">Controle de Dízimos</h4>
                <select id="filtroAno" onchange="carregarTudo()" style="width:auto; padding:5px; margin:0;"><option value="2026">2026</option><option value="2025">2025</option></select>
            </div>
            <table class="table-resumo">
                <tbody id="tbDizimistas"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalCartela" class="modal-overlay hidden" onclick="fecharModalCartela(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h2 id="momeCartela" style="margin:0; color:var(--primary);">Nome</h2>
        <p style="margin:0; color:#888; font-size:0.9rem;">Histórico</p>
        
        <div class="total-ano-box">
            <small style="color:var(--success); font-weight:800;">TOTAL NO ANO</small>
            <div id="valorTotalAno" style="font-size:1.8rem; font-weight:800; color:var(--success);">R$ 0,00</div>
        </div>

        <div class="cartela-grid" id="gridMeses"></div>
        
        <button class="btn-main" onclick="fecharModalCartela(null)" style="background:#eee; color:#555; margin-top:20px;">Fechar</button>
    </div>
</div>

<div id="modalNovoMembro" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 style="margin-top:0;">Novo Membro</h3>
        <form id="formNovoMembro">
            <label>Nome</label><input type="text" name="nome" required>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Nascimento</label><input type="date" name="nasc"></div>
                <div><label>WhatsApp</label><input type="tel" name="tel"></div>
            </div>
            <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:10px;">
                <div><label>Célula</label><select name="celula" id="selCelulas"></select></div>
                <div><label>Categoria</label><select name="cat"><option>Membro</option><option>Frequentador</option></select></div>
            </div>
            <div style="display:flex; gap:20px; margin-top:15px;">
                <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" name="batizado" style="width:auto;"> Batizado</label>
                <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" name="dizimista" checked style="width:auto;"> Dizimista</label>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button type="button" onclick="document.getElementById('modalNovoMembro').classList.add('hidden')" style="flex:1; padding:12px; border-radius:8px; border:1px solid #ddd;">Cancelar</button>
                <button type="submit" style="flex:1; padding:12px; border-radius:8px; border:none; background:var(--primary); color:white; font-weight:bold;">Salvar</button>
            </div>
        </form>
    </div>
</div>

<div id="panelBiblia" class="biblia-panel">
    <div style="background:var(--accent); padding:20px; color:white; display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">A Mensagem</h3>
        <button onclick="fecharBiblia()" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
    </div>
    <div style="padding:15px; background:#f8fafc; display:flex; gap:5px;">
        <select id="bib-livro" onchange="atualizarCapitulos()"></select>
        <select id="bib-cap" onchange="carregarTexto()"></select>
    </div>
    <div id="bib-texto" class="biblia-texto-area" style="padding:20px; overflow-y:auto; flex:1;"></div>
</div>

<script>
    const supabaseUrl = 'https://ryvfogmfpjyamgqsltks.supabase.co';
    const supabaseKey = 'sb_publishable_nFMOC-fPkJnsmf5_noOTBg_tKV6Cr1q';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let dadosMembros = [], dadosFinanceiros = [], dadosCelulas = [];

    window.onload = function() {
        document.getElementById('finData').valueAsDate = new Date();
        carregarTudo();
    };

    async function carregarTudo() {
        const icon = document.getElementById('iconRefresh'); icon.classList.add('fa-spin');
        try {
            const [ {data: mem}, {data: fin}, {data: cel} ] = await Promise.all([
                supabaseClient.from('membros').select('*').order('nome'),
                supabaseClient.from('financeiro').select('*').order('data', {ascending: false}),
                supabaseClient.from('celulas').select('*').order('nome')
            ]);
            dadosMembros = mem || []; dadosFinanceiros = fin || []; dadosCelulas = cel || [];
            
            preencherSelects();
            renderizarDashboard();
            renderizarMembros();
            renderizarDizimistas();
        } finally { icon.classList.remove('fa-spin'); }
    }

    function mudarSecao(s) {
        ['financeiro', 'membros', 'dizimistas'].forEach(id => document.getElementById('secao-'+id).classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('secao-'+s).classList.remove('hidden');
        document.getElementById('btn-'+s).classList.add('active');
    }

    function renderizarDashboard() {
        const hoje = new Date().toISOString().slice(0, 7);
        let ent = 0, sai = 0, total = 0;
        dadosFinanceiros.forEach(f => {
            let v = parseFloat(f.valor);
            if(f.tipo === 'Entrada') total += v; else total -= v;
            if(f.data.startsWith(hoje)) {
                if(f.tipo === 'Entrada') ent += v; else sai += v;
            }
        });
        const fmt = (v) => v.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('kpiSaldo').innerText = fmt(total);
        document.getElementById('kpiEntrada').innerText = fmt(ent);
        document.getElementById('kpiSaida').innerText = fmt(sai);
    }

    function preencherSelects() {
        const sM = document.getElementById('finMembroSelect');
        const sC = document.getElementById('selCelulas');
        sM.innerHTML = '<option value="">Selecione o Membro...</option>';
        sC.innerHTML = '<option value="">Selecione...</option>';
        dadosMembros.forEach(m => sM.innerHTML += `<option value="${m.nome}">${m.nome}</option>`);
        dadosCelulas.forEach(c => sC.innerHTML += `<option value="${c.nome}">${c.nome}</option>`);
    }

    function renderizarDizimistas() {
        const corpo = document.getElementById('tbDizimistas'); corpo.innerHTML = '';
        const ano = document.getElementById('filtroAno').value;
        const fmt = (v) => v.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});

        dadosMembros.filter(m => m.dizimista === 'Sim' || m.dizimista === 'sim').forEach(m => {
            let dFiltro = dadosFinanceiros.filter(f => f.categoria === 'Dízimo' && f.descricao === m.nome);
            let ultimo = 'Sem registro';
            if(dFiltro.length > 0) {
                ultimo = `${dFiltro[0].data.split('-').reverse().join('/')} - ${fmt(parseFloat(dFiltro[0].valor))}`;
            }
            corpo.innerHTML += `
                <tr>
                    <td><strong>${m.nome}</strong></td>
                    <td style="font-size:0.75rem; color:#666;">${ultimo}</td>
                    <td align="right"><button class="btn-detalhes" onclick="abrirCartela('${m.nome}')">DETALHES</button></td>
                </tr>`;
        });
    }

    function abrirCartela(nome) {
        document.getElementById('momeCartela').innerText = nome;
        const ano = document.getElementById('filtroAno').value;
        const dFiltro = dadosFinanceiros.filter(f => f.categoria === 'Dízimo' && f.descricao === nome && f.data.startsWith(ano));
        
        let total = 0; let meses = new Array(12).fill(0);
        dFiltro.forEach(f => {
            let v = parseFloat(f.valor); total += v;
            let m = parseInt(f.data.split('-')[1]) - 1;
            meses[m] += v;
        });

        const fmt = (v) => v.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('valorTotalAno').innerText = fmt(total);
        
        const nomesMes = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
        const grid = document.getElementById('gridMeses'); grid.innerHTML = '';
        meses.forEach((v, i) => {
            let cls = v > 0 ? 'paid' : '';
            let val = v > 0 ? fmt(v) : '-';
            grid.innerHTML += `<div class="month-box ${cls}">${nomesMes[i]}<br>${val}</div>`;
        });

        document.getElementById('modalCartela').classList.remove('hidden');
    }

    function fecharModalCartela(e) { if(!e || e.target.id === 'modalCartela') document.getElementById('modalCartela').classList.add('hidden'); }

    // FORMULÁRIO LANÇAMENTO
    function atualizarCategorias() {
        const t = document.getElementById('finTipo').value;
        const c = document.getElementById('finCategoria');
        c.innerHTML = t === 'Saída' 
            ? '<option value="Despesa Fixa">Despesa Fixa</option><option value="Eventual">Eventual</option>' 
            : '<option value="Dízimo">Dízimo</option><option value="Oferta">Oferta</option>';
        atualizarCampos();
    }
    function atualizarCampos() {
        const t = document.getElementById('finTipo').value; const c = document.getElementById('finCategoria').value;
        if(t==='Entrada' && c==='Dízimo') { document.getElementById('boxMembro').classList.remove('hidden'); document.getElementById('boxDesc').classList.add('hidden'); }
        else { document.getElementById('boxMembro').classList.add('hidden'); document.getElementById('boxDesc').classList.remove('hidden'); }
    }

    document.getElementById('formFinanceiro').onsubmit = async function(e) {
        e.preventDefault(); const btn = document.getElementById('btnSalvarFin'); btn.disabled = true;
        let desc = (this.tipo.value === 'Entrada' && this.categoria.value === 'Dízimo') ? this.membro.value : this.descricao.value;
        const dados = { tipo: this.tipo.value, categoria: this.categoria.value, descricao: desc, valor: parseFloat(this.valor.value), data: this.data.value, metodo: 'Mobile' };
        await supabaseClient.from('financeiro').insert([dados]);
        alert("Salvo!"); carregarTudo(); btn.disabled = false; this.reset();
    };

    // BÍBLIA
    function abrirBiblia() { document.getElementById('panelBiblia').classList.add('open'); }
    function fecharBiblia() { document.getElementById('panelBiblia').classList.remove('open'); }

    function renderizarMembros() {
        const div = document.getElementById('listaMembros'); div.innerHTML = '';
        dadosMembros.forEach(m => {
            div.innerHTML += `
                <div class="card-panel" style="margin-bottom:10px; border-left:4px solid #ddd;">
                    <div style="display:flex; justify-content:space-between;"><strong>${m.nome}</strong><small>${m.tipo}</small></div>
                    <div style="font-size:0.8rem; color:#888;">Célula: ${m.celula}</div>
                </div>`;
        });
    }

    function abrirNovoMembro() { document.getElementById('modalNovoMembro').classList.remove('hidden'); }
</script>

</body>
</html>
