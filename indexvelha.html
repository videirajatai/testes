<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Videira Jataí</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Sistema Videira">
    <meta name="apple-mobile-web-app-title" content="Sistema Videira">
    <meta name="theme-color" content="#0f172a"> 
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { height: 100%; overflow: hidden; background: linear-gradient(135deg, #f4f7f6 0%, #e2e8f0 100%); }
        
        #tela-login {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.5s ease;
        }

        .card-login {
            background: #ffffff; padding: 40px 35px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 90%; max-width: 380px; text-align: center;
            max-height: 95vh; overflow-y: auto;
        }

        .logo { width: 100px; height: auto; margin-bottom: 15px; }
        h2 { color: var(--primary, #600018); font-size: 22px; margin-bottom: 6px; font-weight: 700; }
        p.subtitulo { color: var(--text-light, #718096); font-size: 14px; margin-bottom: 35px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: var(--text-light, #718096); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        
        input[type="text"], input[type="password"], input[type="email"], input[type="tel"] {
            width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 15px; color: var(--text-main, #2d3748); outline: none; transition: 0.3s; background-color: var(--input-bg, #f7fafc);
            box-sizing: border-box;
        }
        input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus, input[type="tel"]:focus { 
            border-color: var(--primary, #600018); background-color: #ffffff; 
        }

        button {
            width: 100%; padding: 16px; margin-top: 10px; background-color: var(--primary, #600018); color: #ffffff;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-sizing: border-box;
        }
        button:hover { background-color: #4a0012; transform: translateY(-1px); }
        button:disabled { background-color: #a0aec0; cursor: not-allowed; }
        
        .btn-secondary { background-color: #ffffff; color: var(--primary, #600018); border: 2px solid var(--primary, #600018); }
        .btn-secondary:hover { background-color: #fdf5f6; transform: translateY(0); }

        .btn-link { background: none; border: none; color: var(--primary, #600018); font-size: 13px; text-decoration: underline; cursor: pointer; padding: 5px; margin-top: 10px; width: 100%; }
        .btn-link:hover { color: #4a0012; }

        .mensagem-erro { color: var(--danger-text, #e53e3e); font-size: 14px; margin-top: 20px; display: none; font-weight: 500; background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px solid #fed7d7; }

        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f4f7f6 0%, #e2e8f0 100%);
            z-index: 5; opacity: 0; transition: opacity 0.4s ease;
        }
        .splash-logo { width: 120px; animation: pulse 1.5s infinite ease-in-out; }
        #splash-screen p { margin-top: 25px; color: var(--text-main, #2d3748); font-size: 15px; font-weight: 600; }

        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        
        /* Oculta os blocos que não são o login inicialmente */
        .bloco { display: none; }
        .bloco.ativo { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="card-login">
            
            <div id="bloco-login" class="bloco ativo">
                <img src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png" alt="Logo Videira" class="logo">
                <h2 id="titulo-login">Bem-vindo(a)</h2>
                <p class="subtitulo" id="subtitulo-login">Acesse o seu painel</p>
                
                <div id="area-form">
                    <div class="input-group">
                        <label>Usuário ou e-mail</label>
                        <input type="text" id="usuario-input" placeholder="Usuário" onkeypress="verificarEnter(event, 'login')" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" 
                               id="senha-input" 
                               inputmode="numeric" 
                               pattern="[0-9]*" 
                               placeholder="••••" 
                               onkeypress="verificarEnter(event, 'login')">
                    </div>
                    
                    <button id="btn-entrar" onclick="verificarLogin()">Entrar no Sistema</button>
                    <p id="mensagem-erro" class="mensagem-erro">⚠️ Usuário ou senha incorretos.</p>
                    
                    <button class="btn-link" onclick="mudarTela('bloco-recuperar')">Esqueci minha senha</button>
                    <button class="btn-link" onclick="mudarTela('bloco-cadastro')">Ainda não tem conta? Cadastre-se</button>
                </div>

                <div id="area-escolha" style="display: none;">
                    <div id="botoes-painel"></div>
                    <button class="btn-secondary" onclick="sair()" style="margin-top: 15px; padding: 10px; font-size: 14px;">Sair / Trocar Usuário</button>
                </div>
            </div>

            <div id="bloco-cadastro" class="bloco">
                <img src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png" alt="Logo Videira" class="logo" style="width: 70px;">
                <h2>Novo Cadastro</h2>
                <p class="subtitulo" style="margin-bottom: 20px;">Preencha para se tornar membro.</p>
                
                <div class="input-group">
                    <label>Nome Completo *</label>
                    <input type="text" id="cad-nome" placeholder="Seu nome completo">
                </div>
                <div class="input-group">
                    <label>E-mail *</label>
                    <input type="email" id="cad-email" placeholder="seuemail@exemplo.com">
                </div>
                <div class="input-group">
                    <label>WhatsApp *</label>
                    <input type="tel" id="cad-whatsapp" placeholder="(00) 00000-0000">
                </div>
                <div class="input-group">
                    <label>Usuário *</label>
                    <input type="text" id="cad-usuario" placeholder="Nome de usuário para login">
                </div>
                <div class="input-group">
                    <label>Senha *</label>
                    <input type="password" id="cad-senha" placeholder="Senha Numérica" inputmode="numeric" pattern="[0-9]*" >                                                  
                </div>
                
                <button id="btn-cadastrar" onclick="cadastrarMembro()">Finalizar Cadastro</button>
                <p id="mensagem-erro-cad" class="mensagem-erro"></p>
                
                <button class="btn-secondary" onclick="mudarTela('bloco-login')" style="margin-top: 15px; padding: 10px; font-size: 14px;">Voltar para o Login</button>
            </div>

            <div id="bloco-recuperar" class="bloco">
                <img src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png" alt="Logo Videira" class="logo" style="width: 70px;">
                <h2>Recuperar Senha</h2>
                <p class="subtitulo" style="margin-bottom: 20px;">Informe seu e-mail para receber o link.</p>
                
                <div class="input-group">
                    <label>Seu E-mail Cadastrado *</label>
                    <input type="email" id="rec-email" placeholder="Digite seu e-mail" onkeypress="verificarEnter(event, 'recuperar')">
                </div>
                
                <button id="btn-recuperar" onclick="enviarRecuperacao()">Enviar Link</button>
                <p id="mensagem-erro-rec" class="mensagem-erro"></p>
                
                <button class="btn-secondary" onclick="mudarTela('bloco-login')" style="margin-top: 15px; padding: 10px; font-size: 14px;">Voltar para o Login</button>
            </div>

        </div>
    </div>

    <div id="splash-screen">
        <img src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png" alt="Carregando" class="splash-logo">
        <p id="splash-texto">Autenticando e carregando painel...</p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // MANTER O BACKEND DO GOOGLE PARA A AGENDA / E-MAILS
        const urlBackend = "https://script.google.com/macros/s/AKfycbxnystn3UqAKnfLUgw7tXS8CzrnpxTS0iax80rhMCRs-T47ibodGYvbRw2KRrtsnCzn/exec"; 
        
        // DADOS DO SUPABASE PARA O LOGIN
        const SB_URL = "https://ryvfogmfpjyamgqsltks.supabase.co"; 
        const SB_KEY = "sb_publishable_nFMOC-fPkJnsmf5_noOTBg_tKV6Cr1q";

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // ================= FUNÇÃO PARA ALTERNAR TELAS =================
        function mudarTela(idBloco) {
            document.querySelectorAll('.bloco').forEach(b => b.classList.remove('ativo'));
            document.getElementById(idBloco).classList.add('ativo');
            
            // Oculta mensagens de erro ao trocar de tela
            document.querySelectorAll('.mensagem-erro').forEach(msg => msg.style.display = 'none');
        }

        async function verificarLogin() {
            const entrada = document.getElementById('usuario-input').value.trim().toLowerCase();
            
            // O TRUQUE DA SENHA TAMBÉM NA HORA DE ENTRAR
            const passDigitado = document.getElementById('senha-input').value.trim();
            const pass = passDigitado + "-videira";

            const erro = document.getElementById('mensagem-erro');
            const btn = document.getElementById('btn-entrar');

            if(!entrada || !passDigitado) { 
                erro.innerText = "⚠️ Preencha usuário/e-mail e senha."; 
                erro.style.display = 'block'; 
                return; 
            }

            btn.innerText = "Autenticando..."; 
            btn.disabled = true; 
            erro.style.display = 'none';

            let emailParaLogin = entrada;

            // Se a pessoa digitou um "nome de usuário" e não um e-mail com @
            if (!entrada.includes('@')) {
                const { data } = await supabaseClient.from('usuarios').select('email').eq('usuario', entrada).single();
                if (data) {
                    emailParaLogin = data.email;
                } else {
                    erro.innerText = "⚠️ Usuário não encontrado.";
                    erro.style.display = 'block';
                    btn.innerText = "Entrar no Sistema"; 
                    btn.disabled = false;
                    return;
                }
            }

            console.log("🔥 TENTANDO LOGAR COM O E-MAIL:", emailParaLogin);
            console.log("🔥 A SENHA ENVIADA É:", pass);

            // LOGIN OFICIAL DO SUPABASE COM O CRACHÁ
            const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({
                email: emailParaLogin,
                password: pass
            });

            if (loginError) {
                erro.innerText = "⚠️ E-mail ou senha incorretos.";
                erro.style.display = 'block';
                document.getElementById('senha-input').value = "";
                btn.innerText = "Entrar no Sistema"; 
                btn.disabled = false;
                return;
            }

            // O Login deu certo! Agora pegamos os dados dele na tabela para saber o Cargo
            const { data: dadosUsuario } = await supabaseClient.from('usuarios').select('*').eq('email', emailParaLogin).single();

            if (dadosUsuario) {
                const nomeReal = dadosUsuario.nome;
                const usuarioReal = dadosUsuario.usuario || dadosUsuario.email; 
                const categoria = (dadosUsuario.categoria || "").toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, "");

                // Grava o LOG
                registrarLog(usuarioReal, nomeReal, "Fez login no sistema");

                // Salva na memória do navegador para as outras telas funcionarem
                sessionStorage.setItem('usuarioLogado', nomeReal);
                sessionStorage.setItem('loginDigitado', usuarioReal); 
                sessionStorage.setItem('urlApi', urlBackend);

                // --- TABELA DE PERMISSÕES DA VIDEIRA ---
                let paginas = [];
                if (categoria === 'administrador') {
                    paginas = [
                        { nome: "Painel Admin", url: "admin" },
                        { nome: "Painel do Pastor", url: "pastor" },
                        { nome: "Painel Discipulador", url: "discipulador" },
                        { nome: "Painel do Líder", url: "lider" },
                        { nome: "Financeiro Mobile", url: "financeiromobile" },
                        { nome: "Painel Financeiro", url: "financeiro" },
                        { nome: "Painel do Membro", url: "membro" }
                    ];
                } else if (categoria === 'pastor') {
                    paginas = [ { nome: "Painel do Pastor", url: "pastor" }, { nome: "Painel Admin", url: "admin" } ];
                } else if (categoria === 'discipulador') {
                    paginas = [ { nome: "Painel Discipulador", url: "discipulador" }, { nome: "Painel do Líder", url: "lider" } ];
                } else if (categoria === 'tesoureiro') {
                    paginas = [ { nome: "Financeiro PC", url: "financeiro" }, { nome: "Financeiro Mobile", url: "financeiromobile" } ];
                } else if (categoria === 'membro') {
                    paginas = [ { nome: "Área do Membro", url: "membro" } ];
                } else {
                    // Categoria Líder ou não identificada cai aqui
                    paginas = [ { nome: "Painel do Líder", url: "lider" } ];
                }

                const urlsPermitidas = paginas.map(p => p.url);
                sessionStorage.setItem('paginasPermitidas', JSON.stringify(urlsPermitidas));

                // Redireciona o usuário
                if (paginas.length === 1) {
                    entrarNoPainel(nomeReal, paginas[0].url);
                } else {
                    document.getElementById('area-form').style.display = 'none';
                    document.getElementById('area-escolha').style.display = 'block';
                    document.getElementById('titulo-login').innerText = `Olá, ${nomeReal}`;
                    document.getElementById('subtitulo-login').innerText = "Qual painel você deseja acessar?";

                    const divBotoes = document.getElementById('botoes-painel');
                    divBotoes.innerHTML = '';
                    paginas.forEach(pag => {
                        let b = document.createElement('button');
                        b.innerText = pag.nome;
                        b.onclick = () => entrarNoPainel(nomeReal, pag.url);
                        divBotoes.appendChild(b);
                    });
                }
            } else {
                erro.innerText = "⚠️ Erro ao buscar os dados do usuário.";
                erro.style.display = 'block';
                btn.innerText = "Entrar no Sistema"; 
                btn.disabled = false;
            }
        }

        // ================= FUNÇÃO DE ANIMAÇÃO DE ENTRADA =================
        function entrarNoPainel(nome, urlDestino) {
            const telaLogin = document.getElementById('tela-login');
            const splashScreen = document.getElementById('splash-screen');
            document.getElementById('splash-texto').innerText = `Carregando...`;

            telaLogin.style.opacity = '0'; 
            setTimeout(() => {
                telaLogin.style.display = 'none';
                splashScreen.style.display = 'flex';
                setTimeout(() => splashScreen.style.opacity = '1', 10);

                setTimeout(() => {
                    window.location.href = urlDestino + ".html";
                }, 1000); 

            }, 400); 
        }

        // ================= FUNÇÃO PARA SALVAR O LOG =================
        async function registrarLog(usuarioDigitado, nomeReal, acaoRealizada) {
            const dataHoraAtual = new Date().toLocaleString('pt-BR'); 
            
            const dadosLog = {
                datahora: dataHoraAtual,
                usuario: usuarioDigitado,
                nomelider: nomeReal,
                acao: acaoRealizada 
            };

            try {
                await fetch(`${SB_URL}/rest/v1/log`, {
                    method: 'POST',
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(dadosLog)
                });
            } catch (e) { console.error("Aviso: Falha ao registrar log.", e); }
        }

        function sair() {
            sessionStorage.clear();
            document.getElementById('area-escolha').style.display = 'none';
            document.getElementById('area-form').style.display = 'block';
            document.getElementById('titulo-login').innerText = "Bem-vindo(a)";
            document.getElementById('subtitulo-login').innerText = "Acesse o seu painel";
            document.getElementById('usuario-input').value = "";
            document.getElementById('senha-input').value = "";
            document.getElementById('btn-entrar').innerText = "Entrar no Sistema";
            document.getElementById('btn-entrar').disabled = false;
        }

        // ================= NOVAS FUNÇÕES: CADASTRO =================
       async function cadastrarMembro() {
            const nome = document.getElementById('cad-nome').value.trim();
            const email = document.getElementById('cad-email').value.trim();
            const whatsapp = document.getElementById('cad-whatsapp').value.trim();
            const usuario = document.getElementById('cad-usuario').value.trim().toLowerCase();
            
            // O TRUQUE DA SENHA: O usuário digita 4 números, a gente completa pra ficar gigante
            const senhaDigitada = document.getElementById('cad-senha').value.trim();
            const senha = senhaDigitada + "-videira"; 
            
            const btn = document.getElementById('btn-cadastrar');
            const erro = document.getElementById('mensagem-erro-cad');

            // Verifica se deixou algo em branco (checa a senha digitada normal)
            if (!nome || !email || !whatsapp || !usuario || !senhaDigitada) {
                erro.innerText = "⚠️ Todos os campos são obrigatórios.";
                erro.style.display = 'block'; 
                return;
            }

            btn.innerText = "Aguarde..."; 
            btn.disabled = true; 
            erro.style.display = 'none';

            // 1. CRIA O CRACHÁ OFICIAL (Auth)
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: senha
            });

            if (authError) {
                erro.innerText = "⚠️ Erro no Cadastro: " + authError.message; 
                erro.style.display = 'block';
                btn.innerText = "Finalizar Cadastro"; 
                btn.disabled = false;
                return;
            }

            // 2. SALVA OS DADOS NA SUA TABELA (Sem mandar o ID, pois ele é gerado pelo banco)
            const novoUsuario = {
                nome: nome,
                email: email,
                whatsapp: whatsapp,
                usuario: usuario,
                categoria: 'membro' // Todo mundo nasce como membro
            };

            const { error: dbError } = await supabaseClient.from('usuarios').insert([novoUsuario]);

            if (dbError) {
                erro.innerText = "⚠️ Erro ao salvar dados. O usuário já existe?";
                erro.style.display = 'block';
            } else {
                alert("Cadastro realizado com sucesso! Faça login para continuar.");
                mudarTela('bloco-login');
                
                // Limpa os campos do formulário
                document.getElementById('cad-nome').value = "";
                document.getElementById('cad-email').value = "";
                document.getElementById('cad-whatsapp').value = "";
                document.getElementById('cad-usuario').value = "";
                document.getElementById('cad-senha').value = "";
            }
            
            btn.innerText = "Finalizar Cadastro"; 
            btn.disabled = false;
        }

        // ================= NOVAS FUNÇÕES: RECUPERAR SENHA =================
       async function enviarRecuperacao() {
            const email = document.getElementById('rec-email').value.trim();
            const btn = document.getElementById('btn-recuperar');
            const erro = document.getElementById('mensagem-erro-rec');

            if (!email) {
                erro.innerText = "⚠️ Informe seu e-mail cadastrado.";
                erro.style.display = 'block';
                return;
            }

            btn.innerText = "Processando...";
            btn.disabled = true;
            erro.style.display = 'none';

            try {
                // 1. O HTML pergunta ao Supabase se o email existe
                const resBusca = await fetch(`${SB_URL}/rest/v1/usuarios?email=ilike.${encodeURIComponent(email)}&select=*`, {
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
                });
                const usuarios = await resBusca.json();

                // 2. Se existir, geramos o token e salvamos no banco
                if (usuarios.length > 0) {
                    const usuario = usuarios[0];
                    const nomeReal = usuario.nome.split(' ')[0];
                    
                    // Gera um token aleatório gigante
                    const tokenGerado = Math.random().toString(36).substring(2) + Date.now().toString(36);

                    // Salva no Supabase
                    const resPatch = await fetch(`${SB_URL}/rest/v1/usuarios?email=eq.${encodeURIComponent(usuario.email)}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SB_KEY,
                            'Authorization': `Bearer ${SB_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ token_recuperacao: tokenGerado })
                    });

                    if(!resPatch.ok) {
                        throw new Error("Supabase bloqueou a edição. Desative o RLS da tabela.");
                    }

                    // 3. Pede pro Google Script (o carteiro) mandar o e-mail
                    await fetch(urlBackend, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'enviarEmail', 
                            email: usuario.email, 
                            nome: nomeReal, 
                            token: tokenGerado 
                        })
                    });
                }

                // 4. Mostra sucesso (mesmo se o email não existir, por segurança)
                alert("Se o e-mail existir, você receberá instruções de redefinição no seu e-mail.");
                document.getElementById('rec-email').value = "";
                mudarTela('bloco-login');

            } catch (e) {
                erro.innerText = "⚠️ Erro: " + e.message;
                erro.style.display = 'block';
                console.error(e);
            } finally {
                btn.innerText = "Enviar Link";
                btn.disabled = false;
            }
        }

        // ================= CONTROLE DE ENTER NOS INPUTS =================
        function verificarEnter(event, contexto) { 
            if (event.key === "Enter") {
                if(contexto === 'login') verificarLogin();
                else if(contexto === 'recuperar') enviarRecuperacao();
            } 
        }
    </script>
</body>
</html>
